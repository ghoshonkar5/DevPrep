<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Box with Gradient Border effect -->
  <rect x="24" y="24" width="464" height="464" rx="128" fill="url(#grad)" />
  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#innerGrad)" />
  
  <!-- Geometric Apex Code Icon -->
  <g filter="url(#glow)" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Bracket -->
    <path d="M 180 180 L 100 256 L 180 332" />
    
    <!-- Right Bracket -->
    <path d="M 332 180 L 412 256 L 332 332" />
    
    <!-- Center Slash -->
    <path d="M 284 150 L 228 362" stroke="#38bdf8" />
  </g>
  
  <!-- Glowing Apex Diamond Dot -->
  <circle cx="256" cy="110" r="16" fill="#06b6d4" filter="url(#glow)" />
</svg>